---
name: security

"on":
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "toolchain.versions.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/security.yml"
    types: [opened, synchronize, labeled]
  schedule:
    - cron: "45 2 * * *"   # nightly audit (02:45 UTC ≈ 04:45 Berlin)
    - cron: "10 3 * * 0"   # weekly deny (03:10 UTC ≈ 05:10 Berlin)
    - cron: "25 3 * * 0"   # weekly SBOM (03:25 UTC ≈ 05:25 Berlin)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit (nightly + on-demand)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'security')) ||
      (github.event_name == 'schedule')
    steps:
      - uses: actions/checkout@v4
      - name: Read Rust version
        id: rust-version
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f toolchain.versions.yml ]; then
            echo "toolchain.versions.yml not found" >&2
            exit 1
          fi
          SED_EXPR="s/^[[:space:]]*rust:[[:space:]]*['\"]?([^'\"#[:space:]]+)['\"]?[[:space:]]*(#.*)?$/\1/p"
          RUST_VERSION="$(sed -nE "${SED_EXPR}" toolchain.versions.yml | head -n1 | xargs)"
          if [ -z "${RUST_VERSION}" ]; then
            echo "failed to parse rust version from toolchain.versions.yml" >&2
            exit 1
          fi
          printf 'rust_version=%s\n' "${RUST_VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.rust_version }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --force
      - name: Run cargo audit (JSON report)
        run: cargo audit --json | tee cargo-audit-report.json
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: cargo-audit-report.json
          retention-days: 14

  deny:
    name: cargo-deny (weekly + on-demand)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'security')) ||
      (github.event_name == 'schedule' && github.event.schedule.cron == '10 3 * * 0')
    steps:
      - uses: actions/checkout@v4
      - name: Read Rust version
        id: rust-version
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f toolchain.versions.yml ]; then
            echo "toolchain.versions.yml not found" >&2
            exit 1
          fi
          SED_EXPR="s/^[[:space:]]*rust:[[:space:]]*['\"]?([^'\"#[:space:]]+)['\"]?[[:space:]]*(#.*)?$/\1/p"
          RUST_VERSION="$(sed -nE "${SED_EXPR}" toolchain.versions.yml | head -n1 | xargs)"
          if [ -z "${RUST_VERSION}" ]; then
            echo "failed to parse rust version from toolchain.versions.yml" >&2
            exit 1
          fi
          printf 'rust_version=%s\n' "${RUST_VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.rust_version }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --force
      - name: Run cargo deny (JSON report)
        run: cargo deny --format json check | tee cargo-deny-report.json
      - name: Upload cargo-deny report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-deny-report
          path: cargo-deny-report.json
          retention-days: 14

  sbom:
    name: syft sbom (weekly + on-demand)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'security')) ||
      (github.event_name == 'schedule' && github.event.schedule.cron == '25 3 * * 0')
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 21
