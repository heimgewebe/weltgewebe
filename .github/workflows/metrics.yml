---
name: "📊 Metrics Snapshot & Validation"
permissions:
  contents: read          # Repo lesen, um Skripte auszuführen
  actions: write          # notwendig für upload-artifact
  checks: write
"on":
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

env:
  # Canonical schema owned by metarepo — weltgewebe is a consumer only.
  METRICS_SCHEMA_URL: https://raw.githubusercontent.com/heimgewebe/metarepo/main/contracts/metrics.snapshot.schema.json
  HAUSKI_POST_URL: ${{ secrets.HAUSKI_METRICS_URL }}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Node for ajv-cli
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b
        with:
          node-version-file: '.node-version'

      - name: Snapshot metrics
        run: bash scripts/wgx-metrics-snapshot.sh --json

      - name: Fetch canonical metrics schema from metarepo
        run: |
          mkdir -p .ci
          curl -fsSL --retry 3 --retry-delay 2 "$METRICS_SCHEMA_URL" -o .ci/metrics.schema.json
          # ajv-cli@5 supports up to draft-2019-09; the canonical schema uses
          # 2020-12 but no 2020-12–specific features.  Normalise the $schema
          # identifier so the validator accepts it without forking the contract.
          tmp=$(mktemp)
          jq '."$schema" = "http://json-schema.org/draft-07/schema#"' \
            .ci/metrics.schema.json > "$tmp" && mv "$tmp" .ci/metrics.schema.json

      - name: Validate metrics contract
        run: npx --yes ajv-cli@5 validate --strict=false -s .ci/metrics.schema.json -d metrics.json

      - name: Optional POST to hausKI
        if: ${{ env.HAUSKI_POST_URL && env.HAUSKI_POST_URL != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 2 \
            -H 'Content-Type: application/json' \
            --data @metrics.json \
            "$HAUSKI_POST_URL"
        continue-on-error: true

      - name: Upload metrics.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-snapshot
          path: metrics.json
          retention-days: 7
