---
name: Deploy Check
permissions:
  contents: read

"on":
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'infra/caddy/**'
      - 'scripts/preflight/**'
      - '.github/workflows/deploy-check.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'infra/caddy/**'
      - 'scripts/preflight/**'
      - '.github/workflows/deploy-check.yml'

jobs:
  csp-contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web App
        run: pnpm --dir apps/web build

      - name: Run CSP contract guard
        run: |
          ROOT=$GITHUB_WORKSPACE \
          CADDYFILE_PATH=infra/caddy/Caddyfile.heim \
          CADDY_TARGET_SITE=weltgewebe.home.arpa \
          scripts/preflight/csp_contract_static.sh
