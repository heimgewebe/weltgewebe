---
name: task-index

"on":
  pull_request:
    paths:
      - "docs/tasks/**"
      - "docs/reports/optimierungsstatus.json"
      - "docs/reports/optimierungsstatus.md"
      - "docs/reports/*status*.md"
      - "docs/reports/*roadmap*.md"
      - "docs/reports/*next-step*.md"
      - "docs/blueprints/*.md"
      - "docs/specs/*.md"
      - "docs/index.md"
      - "docs/roadmap.md"
      - "docs/policies/agent-reading-protocol.md"
      - "README.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "repo.meta.yaml"
      - "agent-policy.yaml"
      - "scripts/docmeta/**"
      - ".github/workflows/task-index.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: task-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  task-index-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate task index schema
        run: python3 -m scripts.docmeta.validate_task_index docs/tasks/index.json
      - name: Check task-control drift
        run: python3 -m scripts.docmeta.generate_task_index --check
      - name: Check agent entrypoint / roadmap sync
        run: python3 -m scripts.docmeta.agent_entrypoint_smoke
      - name: Check planning registration drift (strict)
        run: python3 -m scripts.docmeta.check_planning_registration --mode strict
