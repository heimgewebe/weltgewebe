---
name: agent-safety-preflight

"on":
  pull_request:
    paths:
      - "scripts/agent/**"
      - "scripts/docmeta/generate_agent_readiness.py"
      - "scripts/docmeta/tests/test_generate_agent_readiness.py"
      - "contracts/agent/**"
      - "tests/fixtures/agent/**"
      - "docs/security/**"
      - "docs/reference/agent-operability-fixture-matrix.md"
      - "docs/_generated/agent-readiness.md"
      - "agent-policy.yaml"
      - "AGENTS.md"
      - "repo.meta.yaml"
      - ".github/workflows/agent-safety-preflight.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: agent-safety-preflight-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight-tests:
    name: Agent Safety Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Run preflight unit tests
        run: python3 -m unittest discover scripts/agent/tests/ -v

      - name: Smoke-check CLI (report-only, no task file needed error)
        run: |
          set -euo pipefail
          set +e
          python3 -m scripts.agent.check_agent_preflight \
            --task-file /nonexistent/task.yaml 2>/dev/null
          rc=$?
          set -e
          if [ "$rc" -ne 2 ]; then
            printf 'Expected exit code 2 for missing task file, got %s\n' "$rc" >&2
            exit 1
          fi
          printf 'CLI smoke check passed (exit 2 for missing file).\n'

      - name: Smoke-check CLI (valid task fixture, no findings)
        run: |
          set -euo pipefail
          cat > /tmp/agent-task.yaml <<'YAML'
          task_id: AGENT-SAFE-001
          task_type: doc_change
          allowed_paths:
            - docs/security/
          validation:
            - make ci-validate
          expected_evidence:
            - docs/security/agent-write-scope-baseline.md
          YAML
          python3 -m scripts.agent.check_agent_preflight \
            --task-file /tmp/agent-task.yaml \
            --changed-paths docs/security/agent-write-scope-baseline.md \
            --mode report-only

      - name: Smoke-check handoff validator (valid fixture)
        run: |
          set -euo pipefail
          python3 -m scripts.agent.validate_handoff \
            --task-file tests/fixtures/agent/handoff-task.json \
            --handoff-file tests/fixtures/agent/handoff-valid.json

      - name: Smoke-check handoff validator (invalid fixture)
        run: |
          set -euo pipefail
          set +e
          python3 -m scripts.agent.validate_handoff \
            --task-file tests/fixtures/agent/handoff-task.json \
            --handoff-file tests/fixtures/agent/handoff-invalid-digest.json
          rc=$?
          set -e
          if [ "$rc" -ne 1 ]; then
            printf 'Expected exit code 1 for invalid handoff, got %s\n' "$rc" >&2
            exit 1
          fi
