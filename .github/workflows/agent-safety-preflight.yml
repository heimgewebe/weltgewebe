---
name: agent-safety-preflight

"on":
  pull_request:
    paths:
      - "scripts/agent/**"
      - "scripts/docmeta/generate_agent_readiness.py"
      - "scripts/docmeta/tests/test_generate_agent_readiness.py"
      - "scripts/docmeta/tests/test_agent_readiness_smoke_contract.py"
      - "contracts/agent/**"
      - "tests/fixtures/agent/**"
      - "docs/security/**"
      - "docs/reference/agent-*.md"
      - "docs/reference/agent-operability-fixture-matrix.md"
      - "docs/reference/agent-handoff-contract.md"
      - "docs/blueprints/blueprint-agent-safety-control-layer.md"
      - "docs/claims/registry.yml"
      - "docs/doc-freshness-registry.yml"
      - "docs/tasks/index.json"
      - "docs/tasks/board.md"
      - ".gitattributes"
      - "docs/_generated/agent-readiness.md"
      - "agent-policy.yaml"
      - "AGENTS.md"
      - "repo.meta.yaml"
      - ".github/workflows/agent-safety-preflight.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: agent-safety-preflight-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight-tests:
    name: Agent Safety Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Run agent unit and CLI contract tests
        run: python3 -m unittest discover scripts/agent/tests/ -v

      - name: Smoke-check CLI (report-only, missing task file)
        run: |
          set -euo pipefail
          set +e
          python3 -m scripts.agent.check_agent_preflight \
            --task-file /nonexistent/task.yaml 2>/dev/null
          rc=$?
          set -e
          if [ "$rc" -ne 2 ]; then
            printf 'Expected exit code 2 for missing task file, got %s\n' "$rc" >&2
            exit 1
          fi

      - name: Smoke-check CLI (valid task fixture)
        run: |
          set -euo pipefail
          cat > /tmp/agent-task.yaml <<'YAML'
          task_id: AGENT-SAFE-001
          task_type: doc_change
          allowed_paths:
            - docs/security/
          validation:
            - make ci-validate
          expected_evidence:
            - docs/security/agent-write-scope-baseline.md
          YAML
          python3 -m scripts.agent.check_agent_preflight \
            --task-file /tmp/agent-task.yaml \
            --changed-paths docs/security/agent-write-scope-baseline.md \
            --mode report-only

      - name: Smoke-check handoff validator (valid fixture)
        run: |
          set -euo pipefail
          python3 -m scripts.agent.validate_handoff \
            --task-file tests/fixtures/agent/handoff-task.json \
            --handoff-file tests/fixtures/agent/handoff-valid.json

      - name: Smoke-check dry-run runner (no write)
        run: |
          set -euo pipefail

          repository_state() {
            python3 - <<'PY'
          from pathlib import Path

          from scripts.agent.run_task import repository_state_bytes

          print(repository_state_bytes(Path.cwd()).hex())
          PY
          }

          BEFORE="$(repository_state)"
          OUT="$(mktemp -d)"
          trap 'rm -rf -- "$OUT"' EXIT

          python3 -m scripts.agent.run_task \
            --dry-run \
            --output-dir "$OUT/doc-drift" \
            tests/fixtures/agent/valid-doc-drift-task.json

          python3 -m scripts.agent.run_task \
            --dry-run \
            --output-dir "$OUT/roadmap" \
            tests/fixtures/agent/valid-roadmap-claim-task.json

          python3 -m scripts.agent.run_task \
            --dry-run \
            --output-dir "$OUT/generated-refresh" \
            tests/fixtures/agent/valid-generated-refresh-task.json

          AFTER="$(repository_state)"
          if [ "$BEFORE" != "$AFTER" ]; then
            printf 'Dry-run runner changed Git-visible repository content\n' >&2
            git status --short --untracked-files=all >&2
            exit 1
          fi

      - name: Run agent readiness tests
        run: |
          python3 -m unittest \
            scripts.docmeta.tests.test_generate_agent_readiness \
            scripts.docmeta.tests.test_agent_readiness_smoke_contract \
            -v

      - name: Validate agent contracts (Python)
        run: python3 -m scripts.agent.validate_agent_contracts

      - name: Check handoff fixture digest is fresh
        run: python3 -m scripts.agent.update_handoff_fixtures --check
