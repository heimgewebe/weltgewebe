---
name: Deploy Snapshot
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

"on":
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Run Snapshot (Dry Mode)
        run: |
          bash scripts/deploy-snapshot.sh
        env:
          SNAPSHOT_MODE: dry

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.node-version'

      - name: Validate Snapshot Schema
        run: |
          npx -y ajv-cli@5.0.0 validate \
            -s docs/deploy/deploy.snapshot.schema.json \
            -d artifacts/deploy.snapshot.json \
            -c ajv-formats

      - name: Upload Snapshot
        uses: actions/upload-artifact@v4
        with:
          name: deploy.snapshot.json
          path: artifacts/deploy.snapshot.json
