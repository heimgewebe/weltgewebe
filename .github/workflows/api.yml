---
name: api

"on":
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "configs/app.defaults.yml"
      - ".github/workflows/api.yml"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "configs/app.defaults.yml"
      - ".github/workflows/api.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-lint:
    name: test and lint (rust)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always  # keep cargo output colorized in CI logs
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Optional: Validates that a default app config is parseable (if present)
      - name: Install PyYAML for config validation
        if: hashFiles('configs/app.defaults.yml') != ''
        run: python3 -m pip install --disable-pip-version-check --no-cache-dir pyyaml

      - name: Validate app.defaults.yml (optional)
        if: hashFiles('configs/app.defaults.yml') != ''
        run: |
          python3 - <<'PY'
          import yaml
          from pathlib import Path

          p = Path("configs/app.defaults.yml")
          yaml.safe_load(p.read_text(encoding="utf-8"))
          print("configs/app.defaults.yml: OK")
          PY

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.89.0"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # fmt & clippy at repo root: covers all crates/workspaces
      - name: Format check (workspace)
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings, workspace)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (all features, verbose)
        working-directory: apps/api
        run: cargo test --all-features --verbose

  cookie-session-proof:
    name: cookie session proof (phase 6)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: never
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.89.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run phase 6 cookie/session proof tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked -p weltgewebe-api \
            --test api_auth session_cookie_ \
            -- --test-threads=1 --color never | tee /tmp/cookie-session-proof.log

          if grep -Eq "running 0 tests|0 passed; 0 failed" /tmp/cookie-session-proof.log; then
            echo "ERROR: cookie/session proof matched zero tests" >&2
            exit 1
          fi

          grep -Eq "running [1-9][0-9]* tests" /tmp/cookie-session-proof.log
          grep -Eq "test result: ok\." /tmp/cookie-session-proof.log
          echo "PROVEN: cookie/session proof tests passed (phase 6)"

  db-session-persistence-proof:
    name: db session persistence proof (direct postgres)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      DATABASE_URL: postgres://welt:gewebe@localhost:5432/weltgewebe
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: welt
          POSTGRES_PASSWORD: gewebe
          POSTGRES_DB: weltgewebe
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.89.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Wait for PostgreSQL
        run: |
          max_attempts=15
          for attempt in $(seq 1 "$max_attempts"); do
            if pg_isready -h localhost -p 5432 -U welt -d weltgewebe; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            echo "Waiting for postgres... attempt ${attempt}/${max_attempts}"
            sleep 2
          done
          echo "ERROR: PostgreSQL did not become ready after ${max_attempts} attempts." >&2
          exit 1

      - name: Run db session persistence proof (direct PostgreSQL, --include-ignored)
        run: >-
          cargo test --locked -p weltgewebe-api
          --test db_session_store_persistence
          -- --include-ignored

  magic-link-flow-proof:
    name: magic link flow proof (request to session)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: never
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.89.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run magic-link flow proof
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked -p weltgewebe-api \
            --test api_auth magic_link_full_round_trip_ \
            -- --test-threads=1 --color never | tee /tmp/magic-link-flow-proof.log

          if grep -Eq "running 0 tests|0 passed; 0 failed" /tmp/magic-link-flow-proof.log; then
            echo "ERROR: magic-link flow proof matched zero tests" >&2
            exit 1
          fi

          grep -Eq "running [1-9][0-9]* tests" /tmp/magic-link-flow-proof.log
          grep -Eq "test result: ok\." /tmp/magic-link-flow-proof.log
          echo "PROVEN: magic-link flow proof tests passed"

  dependency-audit:
    name: dependency audit (on-demand)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # By default not on every PR/push: only manually or via "security" label
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'security'))
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.89.0"
      - name: Install cargo-audit
        run: cargo install cargo-audit --force --locked
      - name: cargo audit
        run: cargo audit
