---
name: domain-single-instance-guard
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Independent, always-run gate for the DOMAIN-PG-002 single-instance guard.
# The ci.yml guard-test loop can be skipped on docs-only changes, so a mixed
# docs/code PR could otherwise bypass this guard. This job runs on every PR
# regardless of which paths changed.

permissions:
  contents: read

"on":
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  guard:
    name: domain single-instance guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Bash syntax checks
        run: |
          bash -n scripts/guard/domain-single-instance-guard.sh
          bash -n scripts/tests/test_domain_single_instance_guard.sh
          bash -n scripts/guard/run.sh

      - name: Guard test suite
        run: bash scripts/tests/test_domain_single_instance_guard.sh

      - name: Guard on repository
        run: bash scripts/guard/domain-single-instance-guard.sh

      # The guard orchestrator currently fails on an unrelated, pre-existing
      # guard (compose relative-volume paths in infra/compose/compose.prod.yml),
      # which is out of scope for DOMAIN-PG-002. Run it for visibility, but do
      # not let that unrelated failure gate this PR.
      - name: Guard orchestrator (non-blocking; unrelated pre-existing failure)
        continue-on-error: true
        run: bash scripts/guard/run.sh
