---
name: api-smoke
"on":
  pull_request:
    branches: [main]
    paths:
      - "toolchain.versions.yml"
      - "apps/api/**"
      - "scripts/guard/auth-rate-limit-runtime-smoke.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/api-smoke.yml"
  push:
    branches: [main]
    paths:
      - "toolchain.versions.yml"
      - "apps/api/**"
      - "scripts/guard/auth-rate-limit-runtime-smoke.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/api-smoke.yml"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: api-smoke-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ultra_light_health:
    name: API – ultra-light smoke (health endpoints)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CARGO_TARGET_DIR: ./target
    defaults:
      run:
        working-directory: apps/api
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libpq-dev
      - name: Inject build metadata (compile-time env)
        run: |
          echo "GIT_COMMIT_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Read Rust version
        id: rust-version
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -f toolchain.versions.yml ]; then
            echo "toolchain.versions.yml not found" >&2
            exit 1
          fi
          SED_EXPR="s/^[[:space:]]*rust:[[:space:]]*['\"]?([^'\"#[:space:]]+)['\"]?[[:space:]]*(#.*)?$/\1/p"
          RUST_VERSION="$(sed -nE "${SED_EXPR}" toolchain.versions.yml | head -n1 | xargs)"
          if [ -z "${RUST_VERSION}" ]; then
            echo "failed to parse rust version from toolchain.versions.yml" >&2
            exit 1
          fi
          printf 'rust_version=%s\n' "${RUST_VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.rust_version }}
      - name: Print Rust versions
        run: |
          rustc --version
          cargo --version
      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock','**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-
      - name: Build release (fast start)
        run: |
          set -o pipefail
          mkdir -p /tmp/build-logs
          cargo build --locked --release --bin weltgewebe-api 2>&1 | tee /tmp/build-logs/cargo-build.log
      - name: Upload cargo build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-build-log
          path: /tmp/build-logs/cargo-build.log
      - name: Run API in background
        env:
          API_BIND: 127.0.0.1:8787
          RUST_LOG: info
          RUST_BACKTRACE: 1
          APP_CONFIG_PATH: ${{ github.workspace }}/configs/app.defaults.yml
          AUTH_PUBLIC_LOGIN: "true"
          APP_BASE_URL: "http://127.0.0.1:8787"
          AUTH_RL_EMAIL_PER_MIN: "2"
          AUTH_RL_EMAIL_PER_HOUR: "1000"
          AUTH_RL_IP_PER_MIN: "100"
          AUTH_RL_IP_PER_HOUR: "1000"
          AUTH_LOG_MAGIC_TOKEN: "false"
          AUTH_AUTO_PROVISION: "false"
          SMTP_HOST: "127.0.0.1"
          SMTP_PORT: "1025"
          SMTP_FROM: "noreply@example.invalid"
        run: |
          if [ -x ./target/release/weltgewebe-api ]; then
             BIN="./target/release/weltgewebe-api"
          elif [ -x ../../target/release/weltgewebe-api ]; then
             BIN="../../target/release/weltgewebe-api"
          else
             echo "compiled API binary missing in ./target/release and ../../target/release"
             find . -name weltgewebe-api
             exit 1
          fi

          nohup "$BIN" >/tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          if ! kill -0 "$(cat /tmp/api.pid)" 2>/dev/null; then
            echo "API process failed to start"
            cat /tmp/api.log || true
            exit 1
          fi
          # Wait for the server to accept connections before declaring ready (up to 30 s)
          ready=0
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:8787/health/live >/dev/null 2>&1; then
              ready=1
              break
            fi
            if ! kill -0 "$(cat /tmp/api.pid)" 2>/dev/null; then
              echo "API process exited before becoming ready"
              cat /tmp/api.log || true
              exit 1
            fi
            sleep 0.5
          done
          if [ "$ready" -ne 1 ]; then
            echo "server did not become ready on 127.0.0.1:8787 within 30 s"
            cat /tmp/api.log || true
            ss -ltnp || true
            exit 1
          fi
      - name: Probe /version (startup)
        run: |
          set -euo pipefail
          body="$(curl --max-time 10 --fail-with-body http://127.0.0.1:8787/version)"
          if ! echo "$body" | jq empty >/dev/null 2>&1; then
            echo "API did not return valid JSON: $body"
            exit 1
          fi
          echo "::group::/version body"
          echo "$body"
          echo "::endgroup::"
          # Validate fields using jq (more robust than grep on strings)
          echo "$body" | jq -e '
            type == "object" and
            has("version") and
            has("commit") and
            has("build_timestamp")
          ' >/dev/null

          # Optional: also assert types (string/string/number) — harmless if types differ.
          # echo "$body" | jq -e '
          #   (.version  | type == "string") and
          #   (.commit   | type == "string") and
          #   (.build_timestamp | type == "number")
          # ' >/dev/null
      - name: Wait for API health endpoint
        run: |
          ok=0
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:8787/health/live; then ok=1; break; fi
            sleep 0.5
          done
          [ "$ok" -eq 1 ] || { echo "health/live not ready in time"; exit 1; }
      - name: Probe /health and /metrics
        run: |
          set -euxo pipefail
          curl -fsS http://127.0.0.1:8787/health/live
          curl -fsS -o /dev/null -w "%{http_code}\n" \
            http://127.0.0.1:8787/health/ready \
            | grep -E '^(200|503)$'
          # /metrics darf 200 liefern, Inhalt ist optional; zeigen die ersten Zeilen, falls vorhanden:
          curl -fsS http://127.0.0.1:8787/metrics | head -n 5 \
          || echo "no /metrics yet (ok)"
      - name: Probe /version (field presence)
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:8787/version | jq -e '.version and .commit and .build_timestamp' >/dev/null
      - name: Runtime smoke auth rate limiting
        run: |
          set -euo pipefail
          GEWEBE_API_BASE=http://127.0.0.1:8787 "$GITHUB_WORKSPACE/scripts/guard/auth-rate-limit-runtime-smoke.sh"
      - name: Stop API
        if: always()
        run: |
          PID_FILE=/tmp/api.pid
          if [ -f "$PID_FILE" ]; then
            PID=$(cat "$PID_FILE")
            if kill -0 "$PID" 2>/dev/null; then
              kill "$PID" 2>/dev/null || true
              wait "$PID" 2>/dev/null || true
            fi
          fi
      - name: Upload API log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: /tmp/api.log
