---
name: Basemap Runtime Proof

# This workflow runs four jobs:
#
#   1. basemap-runtime-proof  (Pfad 1 — epistemischer Dry-Run, nicht blockierend)
#      Runs the guard in skip mode with no Caddy and no artefact. Reports
#      NOT_PROVEN to make the gap visible — never a false green.
#
#   2. basemap-range-delivery-proof  (Pfad 2 — echter Runtime-Proof, blockierend)
#      Starts a real Caddy container that serves a synthetic .pmtiles artefact
#      under /local-basemap/* and runs the guard in require mode with
#      scope=range-delivery. The guard issues a Range request via curl and
#      asserts HTTP 206 plus Accept-Ranges/Content-Range. Failure fails the job.
#
#   3. basemap-pmtiles-content-proof (Pfad 3 — echter Content-Proof, blockierend)
#      Builds a real PMTiles artefact via scripts/basemap/build-hamburg-pmtiles.sh,
#      serves it through Caddy, and runs the guard with scope=pmtiles-content.
#      The guard verifies endpoint/range delivery (HTTP 206), the PMTiles magic
#      bytes "PMTiles" and an optional SHA256 match from the generated metadata.
#
#   4. basemap-visual-proof  (Pfad 4 — visueller End-to-End-Proof, blockierend)
#      Reuses the real Hamburg PMTiles artefact from Pfad 3, publishes the
#      stable alias (basemap-hamburg.pmtiles), starts the Vite preview server
#      with the local-basemap-serve middleware, and runs the Playwright visual proof
#      (apps/web/tests/proofs/basemap-real-hamburg-visual.proof.ts) against it.
#      Proves: Browser → Vite middleware → PMTiles alias → HTTP 206 Range delivery
#      → MapLibre canvas visible + isStyleLoaded() → zero remote tile violations.
#      Failure fails the job. Uploads screenshot, trace, and proof summary.
#
# Scope distinction:
#   Pfad 2 proves Caddy HTTP Range delivery against a .pmtiles file. It does
#   NOT validate PMTiles content beyond the delivery chain. The pmtiles-content
#   scope (when used against a real artefact) adds a 7-byte magic-byte prefix
#   check only; tile-directory and structural PMTiles validation remain future work.
#   Pfad 4 proves the browser-side visual pipeline using the Vite middleware (not
#   Caddy); it is a different proof path from Pfad 2/3, not a substitute.
#
# What is NOT a substitute for either proof:
#   - basemap-client-integration.spec.ts (mocked MapLibre protocol handler)
#   - caddy-basemap-route-guard.sh (static Caddyfile structure check)

"on":
  pull_request:
    branches: [main]
    paths:
      - "infra/caddy/**"
      - "scripts/basemap/build-hamburg-pmtiles.sh"
      - "scripts/basemap/publish-basemap.sh"
      - "scripts/guard/basemap-runtime-proof.sh"
      - "apps/web/tests/proofs/**"
      - "apps/web/package.json"
      - "apps/web/playwright.proof.config.ts"
      - "apps/web/vite.config.ts"
      - "map-style/**"
      - ".github/workflows/basemap-runtime-proof.yml"
  push:
    branches: [main]
    paths:
      - "infra/caddy/**"
      - "scripts/basemap/build-hamburg-pmtiles.sh"
      - "scripts/basemap/publish-basemap.sh"
      - "scripts/guard/basemap-runtime-proof.sh"
      - "apps/web/tests/proofs/**"
      - "apps/web/package.json"
      - "apps/web/playwright.proof.config.ts"
      - "apps/web/vite.config.ts"
      - "map-style/**"
      - ".github/workflows/basemap-runtime-proof.yml"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  basemap-runtime-proof:
    name: basemap-runtime-proof
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Skip cleanly when no artefact is present; real script regressions still fail the job.
      BASEMAP_PROOF_MODE: skip
    steps:
      - uses: actions/checkout@v4

      - name: Check guard script is executable
        run: test -x scripts/guard/basemap-runtime-proof.sh

      - name: Run basemap runtime proof guard
        id: proof
        run: |
          set -euo pipefail
          scripts/guard/basemap-runtime-proof.sh 2>&1 | tee /tmp/proof-output.txt
          echo "guard_output<<EOF" >> "${GITHUB_OUTPUT}"
          cat /tmp/proof-output.txt >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Write job summary
        if: always()
        run: |
          set -euo pipefail
          OUTPUT_FILE="/tmp/proof-output.txt"

          printf '## Basemap Runtime Proof\n\n' >> "${GITHUB_STEP_SUMMARY}"

          if grep -q '^PROVEN:' "${OUTPUT_FILE}" 2>/dev/null; then
            printf '%s\n\n' '✅ **PROVEN** — Caddy PMTiles HTTP 206 Range delivery confirmed' \
              >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n' 'Real runtime proof: `curl` → Caddy → PMTiles → 206 Partial Content' \
              >> "${GITHUB_STEP_SUMMARY}"
          elif grep -q '^NOT_PROVEN:' "${OUTPUT_FILE}" 2>/dev/null; then
            printf '%s\n\n' '⚠️ **NOT_PROVEN** — PMTiles artefact not available in this CI run' \
              >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n\n' 'This is expected: the artefact is not committed to the repo and not built here.' \
              >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n' 'Der Job bleibt nicht blockierend, weil der skip-Modus bei NOT_PROVEN exit 0 zurueckgibt.' \
              >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n\n' 'Errors are not masked.' \
              >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n' '**What is NOT a substitute for this proof:**' \
              >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n' '- `basemap-client-integration.spec.ts` — mocked client test only' \
              >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n\n' '- `caddy-basemap-route-guard.sh` — static config check only' \
              >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n' '**To close this gap:** build a PMTiles artefact, run Caddy, and re-run this guard.' \
              >> "${GITHUB_STEP_SUMMARY}"
          else
            printf '%s\n\n' '❌ **FAILED** — Guard exited with an unexpected error' \
              >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n' 'See guard output above for details.' \
              >> "${GITHUB_STEP_SUMMARY}"
          fi

          printf '\n<details><summary>Guard output</summary>\n\n```\n' >> "${GITHUB_STEP_SUMMARY}"
          if [[ -f "${OUTPUT_FILE}" ]]; then
            cat "${OUTPUT_FILE}" >> "${GITHUB_STEP_SUMMARY}"
          else
            printf 'No guard output file was produced.\n' >> "${GITHUB_STEP_SUMMARY}"
          fi
          printf '```\n\n</details>\n' >> "${GITHUB_STEP_SUMMARY}"

  basemap-range-delivery-proof:
    name: basemap-range-delivery-proof
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASEMAP_PROOF_MODE: require
      BASEMAP_PROOF_SCOPE: range-delivery
      BASEMAP_CADDY_URL: http://localhost:8081
      ARTEFACT_NAME: proof-range-delivery.pmtiles
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker availability
        run: |
          set -euo pipefail
          docker --version
          docker info >/dev/null

      - name: Generate synthetic .pmtiles proof artefact
        run: |
          set -euo pipefail
          mkdir -p build/basemap
          # 64 KiB deterministic content. The byte stream is intentionally
          # synthetic: this job proves HTTP Range delivery, not PMTiles content
          # validity. A separate scope (pmtiles-content) is wired in the guard
          # for a future real artefact.
          python3 - <<'PY'
          import os, pathlib
          out = pathlib.Path("build/basemap") / os.environ["ARTEFACT_NAME"]
          # Deterministic 64 KiB payload, not a valid PMTiles file by design.
          data = bytes(((i * 31 + 7) & 0xFF) for i in range(64 * 1024))
          out.write_bytes(data)
          print(f"wrote {out} ({out.stat().st_size} bytes)")
          PY
          ls -la build/basemap/
          test -s "build/basemap/${ARTEFACT_NAME}"

      - name: Start Caddy serving /local-basemap/ from artefact directory
        run: |
          set -euo pipefail
          docker run -d --name caddy-proof \
            -p 8081:8081 \
            -v "${PWD}/infra/caddy/Caddyfile.proof:/etc/caddy/Caddyfile:ro" \
            -v "${PWD}/build/basemap:/srv/weltgewebe-basemap:ro" \
            caddy:2.7 caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
          # Wait for readiness — poll the root response of Caddy.
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null --max-time 2 "${BASEMAP_CADDY_URL}/"; then
              echo "caddy ready after ${i} attempts"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: caddy did not become ready in 30s" >&2
          docker logs caddy-proof || true
          exit 1

      - name: Sanity-check artefact reachable via Caddy (no Range)
        run: |
          set -euo pipefail
          # Plain GET must yield HTTP 200 with the full 64 KiB body.
          HTTP_STATUS="$(curl -sS -w '%{http_code}' \
            -D /tmp/headers-plain.txt -o /tmp/body-plain.bin \
            "${BASEMAP_CADDY_URL}/local-basemap/${ARTEFACT_NAME}")"
          echo "--- plain headers ---"
          cat /tmp/headers-plain.txt
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "ERROR: plain GET returned HTTP ${HTTP_STATUS}; expected 200" >&2
            exit 1
          fi
          BODY_BYTES="$(wc -c </tmp/body-plain.bin)"
          echo "--- body bytes: ${BODY_BYTES} ---"
          if [ "${BODY_BYTES}" != "65536" ]; then
            echo "ERROR: plain GET returned ${BODY_BYTES} bytes; expected 65536" >&2
            exit 1
          fi

      - name: Run basemap runtime proof guard (require + range-delivery)
        id: proof
        run: |
          set -euo pipefail
          BASEMAP_ENDPOINT_PATH="/local-basemap/${ARTEFACT_NAME}" \
            scripts/guard/basemap-runtime-proof.sh 2>&1 | tee /tmp/proof-output.txt

      - name: Capture raw 206 evidence for the audit trail
        if: always()
        run: |
          set -euo pipefail
          # Independent re-issue of the Range request so the response headers
          # appear verbatim in the job log, separate from the guard's own
          # validation pass. If this returns anything other than 206 the
          # previous step has already failed; this is defence in depth.
          # Range bytes=0-511 matches the range used by the guard.
          curl -sS -D /tmp/response-headers.txt -o /dev/null \
            -H 'Range: bytes=0-511' \
            "${BASEMAP_CADDY_URL}/local-basemap/${ARTEFACT_NAME}" || true
          echo "--- response-headers.txt ---"
          cat /tmp/response-headers.txt || true

      - name: Collect caddy logs
        if: always()
        run: |
          docker logs caddy-proof > /tmp/caddy.log 2>&1 || true
          echo "--- caddy.log (tail) ---"
          tail -n 100 /tmp/caddy.log || true

      - name: Tear down Caddy container
        if: always()
        run: docker rm -f caddy-proof || true

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basemap-range-delivery-proof-evidence
          path: |
            /tmp/proof-output.txt
            /tmp/response-headers.txt
            /tmp/headers-plain.txt
            /tmp/caddy.log
          if-no-files-found: warn
          retention-days: 14

      - name: Write job summary
        if: always()
        run: |
          set -euo pipefail
          OUTPUT_FILE="/tmp/proof-output.txt"
          HDR_FILE="/tmp/response-headers.txt"

          printf '## Basemap Range Delivery Proof\n\n' >> "${GITHUB_STEP_SUMMARY}"

          if [[ -f "${OUTPUT_FILE}" ]] && grep -q '^PROVEN:' "${OUTPUT_FILE}"; then
            _msg='✅ **PROVEN (scope=range-delivery)**'
            _msg="${_msg} — real Caddy returned HTTP 206"
            _msg="${_msg} for a Range request against the artefact"
            printf '%s\n\n' "${_msg}" >> "${GITHUB_STEP_SUMMARY}"
            printf '%s\n\n' \
              'Chain: `curl Range` → live Caddy container → `.pmtiles` file → HTTP 206 Partial Content' \
              >> "${GITHUB_STEP_SUMMARY}"
            _msg='**Not proven by this job:** PMTiles magic-byte check'
            _msg="${_msg}"' (7-byte prefix only; tile-directory and structural'
            _msg="${_msg}"' validation remain future work).'
            _msg="${_msg}"' Requires `BASEMAP_PROOF_SCOPE=pmtiles-content`'
            _msg="${_msg}"' against a real PMTiles artefact.'
            printf '%s\n\n' "${_msg}" >> "${GITHUB_STEP_SUMMARY}"
          else
            printf '%s\n\n' '❌ **FAILED** — guard did not report PROVEN' \
              >> "${GITHUB_STEP_SUMMARY}"
          fi

          printf '<details><summary>Guard output</summary>\n\n```\n' >> "${GITHUB_STEP_SUMMARY}"
          if [[ -f "${OUTPUT_FILE}" ]]; then
            cat "${OUTPUT_FILE}" >> "${GITHUB_STEP_SUMMARY}"
          else
            printf 'No guard output captured.\n' >> "${GITHUB_STEP_SUMMARY}"
          fi
          printf '```\n\n</details>\n\n' >> "${GITHUB_STEP_SUMMARY}"

          _sec_hdr='Response headers (independent re-issue)'
          printf '<details><summary>%s</summary>\n\n```\n' \
            "${_sec_hdr}" >> "${GITHUB_STEP_SUMMARY}"
          if [[ -f "${HDR_FILE}" ]]; then
            cat "${HDR_FILE}" >> "${GITHUB_STEP_SUMMARY}"
          else
            printf 'No response headers captured.\n' >> "${GITHUB_STEP_SUMMARY}"
          fi
          printf '```\n\n</details>\n' >> "${GITHUB_STEP_SUMMARY}"

  basemap-pmtiles-content-proof:
    name: basemap-pmtiles-content-proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASEMAP_PROOF_MODE: require
      BASEMAP_PROOF_SCOPE: pmtiles-content
      BASEMAP_CADDY_URL: http://localhost:8081
      SOURCE_DATE_EPOCH: "1704067200"
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker availability
        run: |
          set -euo pipefail
          docker --version
          docker info >/dev/null

      - name: Build real PMTiles artefact (Hamburg)
        run: |
          set -euo pipefail
          bash scripts/basemap/build-hamburg-pmtiles.sh

          ARTEFACT_NAME="basemap-hamburg-v0.1.0.pmtiles"
          ARTEFACT_PATH="build/basemap/${ARTEFACT_NAME}"
          META_PATH="build/basemap/basemap-hamburg-v0.1.0.meta.json"

          test -s "${ARTEFACT_PATH}"
          test -s "${META_PATH}"

          EXPECTED_SHA256="$(python3 - <<'PY'
          import json
          with open('build/basemap/basemap-hamburg-v0.1.0.meta.json', 'r', encoding='utf-8') as f:
              meta = json.load(f)
          value = meta.get('sha256', '')
          if not value:
              raise SystemExit('missing sha256 in metadata')
          print(value)
          PY
          )"

          FILE_SIZE="$(wc -c < "${ARTEFACT_PATH}" | tr -d '[:space:]')"

          printf 'ARTEFACT_NAME=%s\n' "${ARTEFACT_NAME}" >> "${GITHUB_ENV}"
          printf 'ARTEFACT_PATH=%s\n' "${ARTEFACT_PATH}" >> "${GITHUB_ENV}"
          printf 'META_PATH=%s\n' "${META_PATH}" >> "${GITHUB_ENV}"
          printf 'EXPECTED_SHA256=%s\n' "${EXPECTED_SHA256}" >> "${GITHUB_ENV}"
          printf 'ARTEFACT_SIZE=%s\n' "${FILE_SIZE}" >> "${GITHUB_ENV}"

      - name: Start Caddy serving /local-basemap/ from artefact directory
        run: |
          set -euo pipefail
          docker run -d --name caddy-proof-content \
            -p 8081:8081 \
            -v "${PWD}/infra/caddy/Caddyfile.proof:/etc/caddy/Caddyfile:ro" \
            -v "${PWD}/build/basemap:/srv/weltgewebe-basemap:ro" \
            caddy:2.7 caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null --max-time 2 "${BASEMAP_CADDY_URL}/"; then
              echo "caddy ready after ${i} attempts"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: caddy did not become ready in 30s" >&2
          docker logs caddy-proof-content || true
          exit 1

      - name: Run basemap runtime proof guard (require + pmtiles-content)
        id: proof
        run: |
          set -euo pipefail
          BASEMAP_ENDPOINT_PATH="/local-basemap/${ARTEFACT_NAME}" \
          BASEMAP_PMTILES_PATH="${PWD}/${ARTEFACT_PATH}" \
          BASEMAP_EXPECTED_SHA256="${EXPECTED_SHA256}" \
            scripts/guard/basemap-runtime-proof.sh 2>&1 | tee /tmp/proof-output.txt

      - name: Capture raw PMTiles magic bytes and 206 headers
        if: always()
        run: |
          set -euo pipefail
          artefact_path="${ARTEFACT_PATH:-}"
          artefact_name="${ARTEFACT_NAME:-}"
          if [[ -n "${artefact_path}" && -f "${artefact_path}" ]]; then
            xxd -l 16 -g 1 "${artefact_path}" > /tmp/magic-bytes.txt
          else
            printf 'No PMTiles artefact available for magic-byte capture.\n' > /tmp/magic-bytes.txt
          fi
          if [[ -n "${artefact_name}" ]]; then
            curl -sS -D /tmp/response-headers.txt -o /dev/null \
              -H 'Range: bytes=0-511' \
              "${BASEMAP_CADDY_URL}/local-basemap/${artefact_name}" || true
          fi

      - name: Collect caddy logs
        if: always()
        run: |
          docker logs caddy-proof-content > /tmp/caddy.log 2>&1 || true
          tail -n 100 /tmp/caddy.log || true

      - name: Tear down Caddy container
        if: always()
        run: docker rm -f caddy-proof-content || true

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basemap-pmtiles-content-proof-evidence
          path: |
            /tmp/proof-output.txt
            /tmp/magic-bytes.txt
            /tmp/response-headers.txt
            /tmp/caddy.log
            build/basemap/basemap-hamburg-v0.1.0.pmtiles
            build/basemap/basemap-hamburg-v0.1.0.meta.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload reusable visual proof input artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basemap-visual-proof-input
          path: |
            build/basemap/basemap-hamburg-v0.1.0.pmtiles
            build/basemap/basemap-hamburg-v0.1.0.meta.json
          if-no-files-found: error
          retention-days: 14

      - name: Write job summary
        if: always()
        run: |
          set -euo pipefail
          OUTPUT_FILE="/tmp/proof-output.txt"
          artefact_name="${ARTEFACT_NAME:-<unset>}"
          artefact_size="${ARTEFACT_SIZE:-<unset>}"
          expected_sha256="${EXPECTED_SHA256:-<unset>}"

          printf '## Basemap PMTiles Content Proof\n\n' >> "${GITHUB_STEP_SUMMARY}"

          PROVEN_PATTERN='^PROVEN: Caddy PMTiles content verified (scope=pmtiles-content)$'
          if [[ -f "${OUTPUT_FILE}" ]] && grep -q "${PROVEN_PATTERN}" "${OUTPUT_FILE}"; then
            _msg='✅ **PROVEN (scope=pmtiles-content)**'
            _msg="${_msg} — Caddy endpoint, HTTP 206 range, PMTiles magic bytes, and"
            _msg="${_msg} SHA256 verified"
            printf '%s\n\n' "${_msg}" >> "${GITHUB_STEP_SUMMARY}"
            _prov='Artefact provenance: built in CI via'
            _prov="${_prov} scripts/basemap/build-hamburg-pmtiles.sh (Planetiler pinned"
            _prov="${_prov} digest + pinned OSM snapshot hash)."
            printf '%s\n\n' "${_prov}" >> "${GITHUB_STEP_SUMMARY}"
            printf 'Artefact: %s (%s bytes)\n' \
              "${artefact_name}" "${artefact_size}" >> "${GITHUB_STEP_SUMMARY}"
            printf 'PMTiles-Artefakt-SHA256 (from build/basemap/' >> "${GITHUB_STEP_SUMMARY}"
            printf 'basemap-hamburg-v0.1.0.meta.json): %s\n\n' \
              "${expected_sha256}" >> "${GITHUB_STEP_SUMMARY}"
          else
            printf '%s\n\n' \
              '❌ **FAILED** — guard did not report pmtiles-content as PROVEN' \
              >> "${GITHUB_STEP_SUMMARY}"
          fi

          printf '<details><summary>Guard output</summary>\n\n```\n' >> "${GITHUB_STEP_SUMMARY}"
          if [[ -f "${OUTPUT_FILE}" ]]; then
            cat "${OUTPUT_FILE}" >> "${GITHUB_STEP_SUMMARY}"
          else
            printf 'No guard output captured.\n' >> "${GITHUB_STEP_SUMMARY}"
          fi
          printf '```\n\n</details>\n\n' >> "${GITHUB_STEP_SUMMARY}"

          printf '<details><summary>PMTiles magic bytes (first 16)</summary>\n\n```\n' >> "${GITHUB_STEP_SUMMARY}"
          if [[ -f /tmp/magic-bytes.txt ]]; then
            cat /tmp/magic-bytes.txt >> "${GITHUB_STEP_SUMMARY}"
          else
            printf 'No magic-byte capture found.\n' >> "${GITHUB_STEP_SUMMARY}"
          fi
          printf '```\n\n</details>\n' >> "${GITHUB_STEP_SUMMARY}"

  basemap-visual-proof:
    name: basemap-visual-proof
    needs: [basemap-pmtiles-content-proof]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PUBLIC_BASEMAP_MODE: local-sovereign
      PLAYWRIGHT_HTML_REPORT_OPEN: never
      PUPPETEER_SKIP_DOWNLOAD: "true"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/web

      - name: Download reusable PMTiles artefact from content proof
        uses: actions/download-artifact@v4
        with:
          name: basemap-visual-proof-input
          path: /tmp/basemap-visual-proof-input

      - name: Materialize PMTiles artefact for visual proof
        run: |
          set -euo pipefail
          mkdir -p build/basemap
          ARTEFACT_SRC="$(find /tmp/basemap-visual-proof-input -type f \
            -name 'basemap-hamburg-v0.1.0.pmtiles' | head -n 1)"
          META_SRC="$(find /tmp/basemap-visual-proof-input -type f \
            -name 'basemap-hamburg-v0.1.0.meta.json' | head -n 1)"
          test -n "${ARTEFACT_SRC}"
          test -n "${META_SRC}"
          cp "${ARTEFACT_SRC}" build/basemap/basemap-hamburg-v0.1.0.pmtiles
          cp "${META_SRC}" build/basemap/basemap-hamburg-v0.1.0.meta.json
          test -s build/basemap/basemap-hamburg-v0.1.0.pmtiles
          test -s build/basemap/basemap-hamburg-v0.1.0.meta.json

      - name: Publish basemap (create stable alias basemap-hamburg.pmtiles)
        run: |
          set -euo pipefail
          bash scripts/basemap/publish-basemap.sh \
            build/basemap/basemap-hamburg-v0.1.0.pmtiles \
            build/basemap/basemap-hamburg-v0.1.0.meta.json \
            build/basemap/
          test -e build/basemap/basemap-hamburg.pmtiles
          printf 'Alias verified: build/basemap/basemap-hamburg.pmtiles\n'
          ls -la build/basemap/

      - name: Run Playwright visual basemap proof
        id: visual-proof
        run: pnpm test:proof:basemap-real
        working-directory: apps/web

      - name: Upload visual proof screenshot and summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basemap-visual-proof-screenshot
          path: |
            build/proofs/basemap-visual/screenshot.png
            build/proofs/basemap-visual/proof-summary.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload visual proof trace and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basemap-visual-proof-trace
          path: |
            apps/web/test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basemap-visual-proof-report
          path: |
            apps/web/playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Write job summary
        if: always()
        run: |
          set -euo pipefail
          SUMMARY_FILE="build/proofs/basemap-visual/proof-summary.json"
          printf '## Basemap Visual Proof\n\n' >> "${GITHUB_STEP_SUMMARY}"
          if [[ -f "${SUMMARY_FILE}" ]]; then
            VERDICT="$(
              python3 -c \
                'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("verdict", "UNKNOWN"))' \
                "${SUMMARY_FILE}" 2>/dev/null || echo 'UNKNOWN'
            )"
            if [[ "${VERDICT}" == "PROVEN" ]]; then
              _msg='✅ **PROVEN** — MapLibre canvas visible, isStyleLoaded() true,'
              _msg="${_msg} HTTP 206 Range delivery confirmed, zero remote violations"
              printf '%s\n\n' "${_msg}" >> "${GITHUB_STEP_SUMMARY}"
              printf '%s\n\n' \
                'Chain: Browser → Vite middleware → basemap-hamburg.pmtiles → HTTP 206 → MapLibre rendered' \
                >> "${GITHUB_STEP_SUMMARY}"
            else
              printf '%s\n\n' \
                '❌ **NOT PROVEN** — see test results for details' \
                >> "${GITHUB_STEP_SUMMARY}"
            fi
            printf '<details><summary>Proof summary</summary>\n\n```json\n' >> "${GITHUB_STEP_SUMMARY}"
            cat "${SUMMARY_FILE}" >> "${GITHUB_STEP_SUMMARY}"
            printf '\n```\n\n</details>\n' >> "${GITHUB_STEP_SUMMARY}"
          else
            printf '%s\n\n' \
              '❌ **FAILED** — no proof summary found (Playwright test may not have run to completion)' \
              >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
