---
repo_name: weltgewebe
repo_type: service
role: weltgewebe-stack
status: active
summary: >
  Mobile-first Webprojekt mit SvelteKit (Web), Rust/Axum (API), Postgres+Outbox, JetStream und Caddy.

owners:
  - heimgewebe

primary_languages:
  - rust
  - typescript
  - svelte
  - markdown

entrypoints:
  - README.md
  - AGENTS.md
  - docs/index.md

canonical_sources:
  - repo.meta.yaml
  - AGENTS.md
  - agent-policy.yaml
  - docs/policies/agent-reading-protocol.md
  - docs/policies/architecture-critique.md

discovery_roots:
  - .github/workflows/
  - apps/
  - contracts/
  - docs/
  - infra/
  - scripts/
  - src/
  - tests/

generated_artifacts:
  - docs/_generated/doc-index.md
  - docs/_generated/system-map.md
  - docs/_generated/orphans.md
  - docs/_generated/impl-index.md
  - docs/_generated/backlinks.md
  - docs/_generated/supersession-map.md
  - docs/_generated/architecture-drift.md
  - docs/_generated/doc-coverage.md
  - docs/_generated/knowledge-gaps.md
  - docs/_generated/implicit-dependencies.md
  - docs/_generated/change-resonance.md
  - docs/_generated/staleness-report.md
  - docs/_generated/agent-readiness.md

safe_read_paths:
  - README.md
  - AGENTS.md
  - docs/

guarded_write_paths:
  - .github/workflows/
  - apps/
  - contracts/
  - docs/
  - infra/
  - scripts/
  - src/

forbidden_write_paths:
  - docs/_generated/

required_checks:
  - repo-structure-guard
  - docs-relations-guard
  - generated-files-guard

indexing:
  enabled: true
  require_frontmatter_for_docs: true
  require_registry_for_critical_impl: false
  fail_on_untyped_docs: true
  fail_on_missing_doc_index: true
  fail_on_orphans: false
  fail_on_unmapped_critical_impl: false

related_repos: []

keywords:
  - docs
  - agent-ready

agent_reading:
  protocol: docs/policies/agent-reading-protocol.md

truth_model:
  # The canonical machine truth is defined in the precedence array below.
  abort_on_conflict: true
  interpolation_allowed: false
  precedence:
    - class: domain_contracts
      paths: ["contracts/domain/*.schema.json"]
    - class: canonical_policies
      paths: ["repo.meta.yaml", "AGENTS.md", "agent-policy.yaml", "docs/policies/agent-reading-protocol.md", "docs/policies/architecture-critique.md"]
    - class: runtime_configs_and_code
      paths: ["infra/compose/*.yml", "apps/api/src/*", "apps/web/src/*", ".github/workflows/*.yml"]
    - class: normative_specifications
      paths: ["docs/specs/*", "docs/adr/*", "docs/blueprints/*"]
    - class: diagnostic_reports
      paths: ["docs/reports/*"]
    - class: navigational_indices
      paths: ["docs/index.md"]
    - class: generated_diagnostics
      paths: ["docs/_generated/*"]

  generated_is_diagnostic_only: true
  index_is_navigation_only: true
